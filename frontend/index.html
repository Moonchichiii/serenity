<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#F5EDE4" />
    <meta name="msapplication-TileColor" content="#F5EDE4" />

    <!-- Preconnect: critical origins (above fold) -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="preconnect" href="https://serenity.fly.dev" crossorigin />

    <!-- DNS prefetch: lazy-loaded origins (below fold) -->
    <link rel="dns-prefetch" href="https://maps.googleapis.com" />
    <link rel="dns-prefetch" href="https://maps.gstatic.com" />

    <!-- Fonts (self-hosted, LCP-critical) -->
    <link
      rel="preload"
      as="font"
      href="/fonts/Sentient-Variable.woff2"
      type="font/woff2"
      crossorigin
      fetchpriority="high"
    />
    <link
      rel="preload"
      as="font"
      href="/fonts/GeneralSans-Variable.woff2"
      type="font/woff2"
      crossorigin
      fetchpriority="high"
    />

    <!-- Hero Image (LCP-critical) -->
    <link
      rel="preload"
      as="image"
      type="image/webp"
      fetchpriority="high"
      imagesrcset="
        https://res.cloudinary.com/dbzlaawqt/image/upload/f_auto,q_auto:eco,w_320/original_images/hero-spa_1_abgk21_tcip3z 320w,
        https://res.cloudinary.com/dbzlaawqt/image/upload/f_auto,q_auto:eco,w_640/original_images/hero-spa_1_abgk21_tcip3z 640w,
        https://res.cloudinary.com/dbzlaawqt/image/upload/f_auto,q_auto:eco,w_1024/original_images/hero-spa_1_abgk21_tcip3z 1024w,
        https://res.cloudinary.com/dbzlaawqt/image/upload/f_auto,q_auto:eco,w_1376/original_images/hero-spa_1_abgk21_tcip3z 1376w
      "
      imagesizes="100vw"
    />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
    />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- SEO -->
    <title>Serenity — Massages Thérapeutiques à Marseille</title>
    <meta
      name="description"
      content="Massages bien-être à Marseille : Californien, drainage lymphatique, soins prénatals et AMMA assis pour entreprises et événements."
    />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <link rel="canonical" href="https://www.laserenity.fr/" />

    <!-- Alternate Languages -->
    <link rel="alternate" href="https://www.laserenity.fr/" hreflang="fr" />
    <link
      rel="alternate"
      href="https://www.laserenity.fr/en/"
      hreflang="en"
    />
    <link
      rel="alternate"
      href="https://www.laserenity.fr/"
      hreflang="x-default"
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Serenity — Massages Thérapeutiques à Marseille"
    />
    <meta
      property="og:description"
      content="Californien, drainage lymphatique, massage prénatal et AMMA assis. Séances personnalisées."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.laserenity.fr/" />
    <meta
      property="og:image"
      content="https://www.laserenity.fr/og-image.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Serenity" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "HealthAndBeautyBusiness",
        "name": "Serenity",
        "image": "https://www.laserenity.fr/og-image.jpg",
        "url": "https://www.laserenity.fr/",
        "telephone": "+33600000000",
        "priceRange": "€€",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Marseille",
          "postalCode": "13004",
          "addressCountry": "FR"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 43.30135,
          "longitude": 5.39362
        },
        "areaServed": {
          "@type": "City",
          "name": "Marseille"
        },
        "sameAs": ["https://www.instagram.com/laserenity_marseille"]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
