      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/localize/api/snippets/{app_label}/{model_name}/{id}/:
    get:
      operationId: cms_admin_localize_api_snippets_retrieve_2
      parameters:
      - in: path
        name: app_label
