openapi: 3.0.3
info:
  title: Serenity API
  version: 1.0.0
  description: Wellness & spa platform — bookings, vouchers, CMS, availability
paths:
  /api/calendar/busy/:
    get:
      operationId: calendar_busy_retrieve
      description: Return busy dates for a given year and month.
      tags:
      - calendar
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/calendar/slots/:
    get:
      operationId: calendar_slots_retrieve
      description: Return available time slots for a given date.
      tags:
      - calendar
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/contact/submit/:
    post:
      operationId: contact_submit_create
      description: POST /api/contact/submit/
      tags:
      - contact
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/homepage/hydrated/:
    get:
      operationId: homepage_hydrated_retrieve
      tags:
      - homepage
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/testimonials/:
    get:
      operationId: testimonials_retrieve
      description: Return approved testimonials, optionally filtered by min_rating.
      tags:
      - testimonials
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/testimonials/{testimonial_id}/reply/:
    post:
      operationId: testimonials_reply_create
      description: Submit a reply to a testimonial for moderation.
      parameters:
      - in: path
        name: testimonial_id
        schema:
          type: integer
        required: true
      tags:
      - testimonials
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/testimonials/stats/:
    get:
      operationId: testimonials_stats_retrieve
      description: Return aggregate statistics for approved testimonials.
      tags:
      - testimonials
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/testimonials/submit/:
    post:
      operationId: testimonials_submit_create
      description: Submit a new testimonial for moderation.
      tags:
      - testimonials
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/vouchers/create/:
    post:
      operationId: vouchers_create_create
      description: Create a gift voucher and optionally book a calendar slot.
      tags:
      - vouchers
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/vouchers/cancel/{confirmation_code}/:
    delete:
      operationId: vouchers_cancel_destroy
      description: Cancel a booking by confirmation code.
      parameters:
      - in: path
        name: confirmation_code
        schema:
          type: string
        required: true
      tags:
      - vouchers
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        "200":
          description: Booking cancelled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  confirmation_code:
                    type: string
                  status:
                    type: string
        "400":
          description: Cannot cancel booking in current status
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
  /cms-admin/api/main/documents/:
    get:
      operationId: cms_admin_api_main_documents_retrieve
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - basicAuth: []
