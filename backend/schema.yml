  /cms-admin/api/main/images/{id}/:
    get:
      operationId: cms_admin_api_main_images_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/api/main/images/find/:
    get:
      operationId: cms_admin_api_main_images_find_retrieve
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/api/main/pages/:
    get:
      operationId: cms_admin_api_main_pages_retrieve
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/api/main/pages/{id}/:
    get:
      operationId: cms_admin_api_main_pages_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/api/main/pages/{id}/action/{action_name}/:
    post:
      operationId: cms_admin_api_main_pages_action_create
      parameters:
      - in: path
        name: action_name
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - {}
