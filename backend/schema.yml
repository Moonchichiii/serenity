openapi: 3.0.3
info:
  title: Serenity API
  version: 1.0.0
  description: Wellness & spa platform — bookings, vouchers, CMS, availability
paths:
  /api/calendar/busy/:
    get:
      operationId: calendar_busy_retrieve
      description: Return busy dates for a given year and month.
      tags:
      - calendar
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/calendar/slots/:
    get:
      operationId: calendar_slots_retrieve
      description: Return available time slots for a given date.
      tags:
      - calendar
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/contact/submit/:
    post:
      operationId: contact_submit_create
      description: POST /api/contact/submit/
      tags:
      - contact
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/homepage/hydrated/:
    get:
      operationId: homepage_hydrated_retrieve
      tags:
      - homepage
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HydratedHomepageResponse'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/payments/checkout/:
    post:
      operationId: payments_checkout_create
      tags:
      - payments
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/payments/status/:
    get:
      operationId: payments_status_retrieve
      tags:
      - payments
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/testimonials/:
    get:
      operationId: testimonials_retrieve
      description: Return approved testimonials, optionally filtered by min_rating.
      tags:
      - testimonials
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/testimonials/{testimonial_id}/reply/:
    post:
      operationId: testimonials_reply_create
      parameters:
      - in: path
        name: testimonial_id
        schema:
          type: integer
        required: true
      tags:
      - testimonials
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/testimonials/stats/:
    get:
      operationId: testimonials_stats_retrieve
      description: Return aggregate statistics for approved testimonials.
      tags:
      - testimonials
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/testimonials/submit/:
    post:
      operationId: testimonials_submit_create
      description: Submit a new testimonial for moderation.
      tags:
      - testimonials
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/vouchers/create/:
    post:
      operationId: vouchers_create_create
      tags:
      - vouchers
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/api/main/documents/:
    get:
      operationId: cms_admin_api_main_documents_retrieve
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/api/main/documents/{id}/:
    get:
      operationId: cms_admin_api_main_documents_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/api/main/documents/find/:
    get:
      operationId: cms_admin_api_main_documents_find_retrieve
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/api/main/images/:
    get:
      operationId: cms_admin_api_main_images_retrieve
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/api/main/images/{id}/:
    get:
      operationId: cms_admin_api_main_images_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/api/main/images/find/:
    get:
      operationId: cms_admin_api_main_images_find_retrieve
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/api/main/pages/:
    get:
      operationId: cms_admin_api_main_pages_retrieve
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/api/main/pages/{id}/:
    get:
      operationId: cms_admin_api_main_pages_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/api/main/pages/{id}/action/{action_name}/:
    post:
      operationId: cms_admin_api_main_pages_action_create
      parameters:
      - in: path
        name: action_name
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/api/main/pages/find/:
    get:
      operationId: cms_admin_api_main_pages_find_retrieve
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/localize/api/snippets/{app_label}/{model_name}/:
    get:
      operationId: cms_admin_localize_api_snippets_retrieve
      parameters:
      - in: path
        name: app_label
        schema:
          type: string
        required: true
      - in: path
        name: model_name
        schema:
          type: string
        required: true
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/localize/api/snippets/{app_label}/{model_name}/{id}/:
    get:
      operationId: cms_admin_localize_api_snippets_retrieve_2
      parameters:
      - in: path
        name: app_label
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      - in: path
        name: model_name
        schema:
          type: string
        required: true
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/localize/translate/{translation_id}/overrides/{overridable_segment_id}/edit/:
    put:
      operationId: cms_admin_localize_translate_overrides_edit_update
      parameters:
      - in: path
        name: overridable_segment_id
        schema:
          type: integer
        required: true
      - in: path
        name: translation_id
        schema:
          type: integer
        required: true
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: cms_admin_localize_translate_overrides_edit_destroy
      parameters:
      - in: path
        name: overridable_segment_id
        schema:
          type: integer
        required: true
      - in: path
        name: translation_id
        schema:
          type: integer
        required: true
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /cms-admin/localize/translate/{translation_id}/strings/{string_segment_id}/edit/:
    put:
      operationId: cms_admin_localize_translate_strings_edit_update
      parameters:
      - in: path
        name: string_segment_id
        schema:
          type: integer
        required: true
      - in: path
        name: translation_id
        schema:
          type: integer
        required: true
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: cms_admin_localize_translate_strings_edit_destroy
      parameters:
      - in: path
        name: string_segment_id
        schema:
          type: integer
        required: true
      - in: path
        name: translation_id
        schema:
          type: integer
        required: true
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        detail:
          type: string
      required:
      - error
    HeroSlide:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title_en:
          type: string
        title_fr:
          type: string
        subtitle_en:
          type: string
        subtitle_fr:
          type: string
        image:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
      required:
      - id
      - image
    HomePage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          description: The name of the page as it will appear in URLs e.g http://domain.com/blog/[my-slug]/
          pattern: ^[-\w]+$
          maxLength: 255
        hero_title_en:
          type: string
          description: Main headline — keep it short and impactful (e.g. 'Find Your
            Balance').
          maxLength: 200
        hero_title_fr:
          type: string
          description: 'Titre principal — court et percutant (ex : ''Trouvez Votre
            Équilibre'').'
          maxLength: 200
        hero_subtitle_en:
          type: string
          description: Tagline under the title — describe your offer in one sentence.
          maxLength: 300
        hero_subtitle_fr:
          type: string
          description: Sous-titre — décrivez votre offre en une phrase.
          maxLength: 300
        hero_image:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        hero_slides:
          type: array
          items:
            $ref: '#/components/schemas/HeroSlide'
          readOnly: true
        about_title_en:
          type: string
          description: Section heading (e.g. 'About Me').
          maxLength: 200
        about_title_fr:
          type: string
          description: 'Titre de section (ex : ''À Propos de Moi'').'
          maxLength: 200
        about_subtitle_en:
          type: string
          description: Subtitle under About title (e.g. 'Dedicated to Your Wellness').
          maxLength: 200
        about_subtitle_fr:
          type: string
          description: 'Sous-titre (ex : ''Dédiée à Votre Bien-Être'').'
          maxLength: 200
        about_intro_en:
          type: string
          description: Your professional introduction — who you are and your experience.
        about_intro_fr:
          type: string
          description: Votre présentation professionnelle — qui vous êtes et votre
            expérience.
        about_certification_en:
          type: string
          description: Your main certification (e.g. 'Certified Professional Massage
            Therapist').
          maxLength: 200
        about_certification_fr:
          type: string
          description: 'Votre certification principale (ex : ''Massothérapeute Professionnelle
            Certifiée'').'
          maxLength: 200
        about_approach_title_en:
          type: string
          description: Title for your approach section (e.g. 'My Approach').
          maxLength: 200
        about_approach_title_fr:
          type: string
          description: 'Titre de votre approche (ex : ''Mon Approche'').'
          maxLength: 200
        about_approach_text_en:
          type: string
          description: Describe your unique approach to massage therapy.
        about_approach_text_fr:
          type: string
          description: Décrivez votre approche unique du massage thérapeutique.
        services_hero_title_en:
          type: string
          description: Main title for the services hero section (English).
          maxLength: 255
        services_hero_title_fr:
          type: string
          description: Main title for the services hero section (Français).
          maxLength: 255
        services_hero_pricing_label_en:
          type: string
          description: Label before price (English).
          maxLength: 100
        services_hero_pricing_label_fr:
          type: string
          description: Label before price (Français).
          maxLength: 100
        services_hero_price_en:
          type: string
          description: Displayed price (English).
          maxLength: 100
        services_hero_price_fr:
          type: string
          description: Displayed price (Français).
          maxLength: 100
        services_hero_cta_en:
          type: string
          description: CTA button text (English).
          maxLength: 100
        services_hero_cta_fr:
          type: string
          description: CTA button text (Français).
          maxLength: 100
        services_hero_benefit_1_en:
          type: string
          maxLength: 200
        services_hero_benefit_1_fr:
          type: string
          maxLength: 200
        services_hero_benefit_2_en:
          type: string
          maxLength: 200
        services_hero_benefit_2_fr:
          type: string
          maxLength: 200
        services_hero_benefit_3_en:
          type: string
          maxLength: 200
        services_hero_benefit_3_fr:
          type: string
          maxLength: 200
        services_hero_video_public_id:
          type: string
          description: Cloudinary public ID for background video (e.g. 'serenity/corporate-loop').
            Do NOT include file extension.
          maxLength: 255
        services_hero_video_url:
          type: string
          nullable: true
          readOnly: true
        services_hero_poster_image:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        faq_title_en:
          type: string
          description: FAQ section heading (English).
          maxLength: 200
        faq_title_fr:
          type: string
          description: Titre de la section FAQ (Français).
          maxLength: 200
        faq_subtitle_en:
          type: string
          description: Short subtitle under the FAQ heading (English).
          maxLength: 300
        faq_subtitle_fr:
          type: string
          description: Sous-titre de la section FAQ (Français).
          maxLength: 300
        faq_q1_en:
          type: string
          maxLength: 300
        faq_q1_fr:
          type: string
          maxLength: 300
        faq_a1_en:
          type: string
        faq_a1_fr:
          type: string
        faq_q2_en:
          type: string
          maxLength: 300
        faq_q2_fr:
          type: string
          maxLength: 300
        faq_a2_en:
          type: string
        faq_a2_fr:
          type: string
        faq_q3_en:
          type: string
          maxLength: 300
        faq_q3_fr:
          type: string
          maxLength: 300
        faq_a3_en:
          type: string
        faq_a3_fr:
          type: string
        faq_q4_en:
          type: string
          maxLength: 300
        faq_q4_fr:
          type: string
          maxLength: 300
        faq_a4_en:
          type: string
        faq_a4_fr:
          type: string
        faq_q5_en:
          type: string
          maxLength: 300
        faq_q5_fr:
          type: string
          maxLength: 300
        faq_a5_en:
          type: string
        faq_a5_fr:
          type: string
        faq_q6_en:
          type: string
          maxLength: 300
        faq_q6_fr:
          type: string
          maxLength: 300
        faq_a6_en:
          type: string
        faq_a6_fr:
          type: string
        faq_q7_en:
          type: string
          maxLength: 300
        faq_q7_fr:
          type: string
          maxLength: 300
        faq_a7_en:
          type: string
        faq_a7_fr:
          type: string
        faq_q8_en:
          type: string
          maxLength: 300
        faq_q8_fr:
          type: string
          maxLength: 300
        faq_a8_en:
          type: string
        faq_a8_fr:
          type: string
      required:
      - hero_image
      - hero_slides
      - id
      - services_hero_poster_image
      - services_hero_video_url
      - slug
    HydratedHomepageResponse:
      type: object
      properties:
        page:
          $ref: '#/components/schemas/HomePage'
        services: {}
        globals:
          nullable: true
        testimonials: {}
      required:
      - globals
      - page
      - services
      - testimonials
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
tags:
- name: cms
  description: CMS & hydrated homepage
- name: vouchers
  description: Gift voucher operations
- name: availability
  description: Google Calendar availability
- name: testimonials
  description: Testimonial submission & listing
- name: contact
  description: Contact form
