        '200':
          description: No response body
  /cms-admin/localize/api/snippets/{app_label}/{model_name}/:
    get:
      operationId: cms_admin_localize_api_snippets_retrieve
      parameters:
      - in: path
        name: app_label
        schema:
          type: string
        required: true
      - in: path
        name: model_name
        schema:
          type: string
        required: true
      tags:
      - cms-admin
      security:
