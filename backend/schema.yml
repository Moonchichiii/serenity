      responses:
        '200':
          description: No response body
    delete:
      operationId: cms_admin_localize_translate_overrides_edit_destroy
      parameters:
      - in: path
        name: overridable_segment_id
        schema:
          type: integer
        required: true
      - in: path
        name: translation_id
