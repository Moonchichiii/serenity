      responses:
        '200':
          description: No response body
  /cms-admin/api/main/documents/{id}/:
    get:
      operationId: cms_admin_api_main_documents_retrieve_2
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - cms-admin
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /cms-admin/api/main/documents/find/:
    get:
      operationId: cms_admin_api_main_documents_find_retrieve
